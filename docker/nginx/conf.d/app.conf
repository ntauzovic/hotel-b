server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    # Logovi
    access_log /var/log/nginx/hotel_access.log;
    error_log  /var/log/nginx/hotel_error.log;

    # Maksimalna velicina upload-a
    client_max_body_size 100M;

    # Sve rute idu kroz Laravel (index.php)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM konfiguracija
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;          # "app" je ime Docker servisa
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # Zabrani pristup .htaccess fajlovima
    location ~ /\.ht {
        deny all;
    }

    # Cache za staticke fajlove
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
